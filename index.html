<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>连麦音色排行榜</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .tier-row {
            min-height: 80px;
            transition: background-color 0.2s;
        }
        @media (min-width: 640px) {
            .tier-row { min-height: 110px; }
        }
        .item-card {
            cursor: grab;
            user-select: none;
            touch-action: none;
        }
        .item-card:active {
            cursor: grabbing;
        }
        .dragging {
            opacity: 0.6;
            transform: scale(1.1);
            z-index: 9999 !important;
            pointer-events: none;
        }
        .drop-target {
            background-color: rgba(0, 0, 0, 0.15) !important;
            outline: 2px dashed #000 !important;
        }
        /* 精確匹配圖片配色 */
        .bg-tier-red { background-color: #ff3131; }
        .bg-tier-orange { background-color: #ffbd31; }
        .bg-tier-yellow { background-color: #ffff00; }
        .bg-tier-cream { background-color: #fffce0; }
        .bg-tier-grey { background-color: #d9d9d9; }
        .bg-content-grey { background-color: #b3b3b3; }
    </style>
</head>
<body class="bg-gray-200 text-gray-900 min-h-screen font-sans overflow-x-hidden">

    <div class="max-w-4xl mx-auto p-4 pb-24">
        <header class="mb-6 text-center">
            <h1 class="text-3xl font-bold text-gray-800">连麦音色排行榜</h1>
            <p class="text-gray-600 text-sm mt-1">男生音色排名 | 支持手机触屏</p>
            <p class="text-gray-500 text-xs mt-1 font-medium">拖拽</p>
        </header>

        <!-- 添加項目部分 -->
        <div class="bg-white p-4 border-2 border-black shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] mb-8">
            <h2 class="text-lg font-bold mb-4 flex items-center gap-2 text-gray-800">
                添加待评价音色
            </h2>
            <div class="flex gap-2 mb-6">
                <input type="text" id="item-input" placeholder="输入名称..." class="flex-1 bg-gray-50 border-2 border-black px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 font-bold">
                <button onclick="addItem()" class="bg-black hover:bg-gray-800 text-white px-6 py-2 font-bold transition-colors border-2 border-black">添加</button>
            </div>

            <!-- 待選池 -->
            <div id="pool" class="tier-row flex flex-wrap content-start gap-2 p-2 bg-gray-300 border-2 border-black min-h-[100px]" ondrop="drop(event)" ondragover="allowDrop(event)" ondragleave="dragLeave(event)">
                <!-- 待選項目將在此生成 -->
            </div>
        </div>

        <!-- 排行榜等級容器 -->
        <div id="tier-container" class="mb-8 border-2 border-black shadow-[4px_4px_0px_0px_rgba(0,0,0,1)]">
            <!-- 夯 -->
            <div class="flex border-b-2 border-black last:border-b-0" data-tier="夯">
                <div class="w-16 sm:w-28 bg-tier-red flex items-center justify-center text-xl sm:text-2xl font-black text-black shrink-0 border-r-2 border-black">夯</div>
                <div class="tier-row flex-1 p-2 flex flex-wrap content-start gap-2 bg-content-grey" ondrop="drop(event)" ondragover="allowDrop(event)" ondragleave="dragLeave(event)"></div>
            </div>

            <!-- 顶级 -->
            <div class="flex border-b-2 border-black last:border-b-0" data-tier="顶级">
                <div class="w-16 sm:w-28 bg-tier-orange flex items-center justify-center text-xl sm:text-2xl font-black text-black shrink-0 border-r-2 border-black">顶级</div>
                <div class="tier-row flex-1 p-2 flex flex-wrap content-start gap-2 bg-content-grey" ondrop="drop(event)" ondragover="allowDrop(event)" ondragleave="dragLeave(event)"></div>
            </div>

            <!-- 人上人 -->
            <div class="flex border-b-2 border-black last:border-b-0" data-tier="人上人">
                <div class="w-16 sm:w-28 bg-tier-yellow flex items-center justify-center text-xl sm:text-2xl font-black text-black shrink-0 border-r-2 border-black">人上人</div>
                <div class="tier-row flex-1 p-2 flex flex-wrap content-start gap-2 bg-content-grey" ondrop="drop(event)" ondragover="allowDrop(event)" ondragleave="dragLeave(event)"></div>
            </div>

            <!-- NPC -->
            <div class="flex border-b-2 border-black last:border-b-0" data-tier="NPC">
                <div class="w-16 sm:w-28 bg-tier-cream flex items-center justify-center text-xl sm:text-2xl font-black text-black shrink-0 border-r-2 border-black">NPC</div>
                <div class="tier-row flex-1 p-2 flex flex-wrap content-start gap-2 bg-content-grey" ondrop="drop(event)" ondragover="allowDrop(event)" ondragleave="dragLeave(event)"></div>
            </div>

            <!-- 拉完了 -->
            <div class="flex border-b-2 border-black last:border-b-0" data-tier="拉完了">
                <div class="w-16 sm:w-28 bg-tier-grey flex items-center justify-center text-xs sm:text-2xl font-black text-black shrink-0 border-r-2 border-black text-center px-1">拉完了</div>
                <div class="tier-row flex-1 p-2 flex flex-wrap content-start gap-2 bg-content-grey" ondrop="drop(event)" ondragover="allowDrop(event)" ondragleave="dragLeave(event)"></div>
            </div>
        </div>

        <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-black text-white px-4 py-2 rounded shadow-2xl opacity-0 transition-opacity pointer-events-none text-sm z-50">
            已成功添加！
        </div>
    </div>

    <script>
        let draggedElement = null;
        let touchData = null;

        function addItem() {
            const input = document.getElementById('item-input');
            const text = input.value.trim();
            if (!text) return;

            const pool = document.getElementById('pool');
            const item = createItemElement(text);
            pool.appendChild(item);
            
            input.value = '';
            input.focus();
            showToast(`已添加 "${text}"`);
        }

        // 處理刪除或回到待選池的邏輯
        function handleItemAction(el) {
            const pool = document.getElementById('pool');
            if (el.parentElement === pool) {
                // 如果已在待選池，則徹底刪除
                el.remove();
            } else {
                // 如果在排行榜中，則移回待選池
                pool.appendChild(el);
            }
        }

        function createItemElement(text) {
            const id = 'item-' + Math.random().toString(36).substr(2, 9);
            const div = document.createElement('div');
            div.id = id;
            div.className = 'item-card bg-white text-black border-2 border-black font-black text-[10px] sm:text-base aspect-square w-[22.5%] sm:w-24 flex items-center justify-center text-center group relative shadow-[3px_3px_0px_0px_rgba(0,0,0,1)] overflow-hidden shrink-0';
            div.draggable = true;
            div.innerHTML = `
                <span class="p-1 break-all leading-tight">${text}</span>
                <button onclick="handleItemAction(this.parentElement)" class="absolute top-0 right-0 text-red-500 hover:text-red-700 font-bold p-1 text-[10px] opacity-100 sm:opacity-0 sm:group-hover:opacity-100 transition-opacity">×</button>
            `;

            // 桌面端事件
            div.ondragstart = (e) => {
                draggedElement = div;
                setTimeout(() => div.classList.add('dragging'), 0);
                e.dataTransfer.setData('text/plain', id);
            };
            div.ondragend = () => {
                div.classList.remove('dragging');
                draggedElement = null;
            };

            // 移动端事件
            div.addEventListener('touchstart', handleTouchStart, { passive: false });
            div.addEventListener('touchmove', handleTouchMove, { passive: false });
            div.addEventListener('touchend', handleTouchEnd, { passive: false });

            return div;
        }

        function allowDrop(e) {
            e.preventDefault();
            const target = e.target.closest('.tier-row');
            if (target) target.classList.add('drop-target');
        }

        function dragLeave(e) {
            const target = e.target.closest('.tier-row');
            if (target) target.classList.remove('drop-target');
        }

        function drop(e) {
            e.preventDefault();
            const target = e.target.closest('.tier-row');
            if (target && draggedElement) {
                target.classList.remove('drop-target');
                target.appendChild(draggedElement);
            }
        }

        function handleTouchStart(e) {
            const touch = e.touches[0];
            // 排除點擊按鈕的情況
            if (e.target.tagName === 'BUTTON') return;

            const rect = this.getBoundingClientRect();
            touchData = {
                element: this,
                offsetX: touch.clientX - rect.left,
                offsetY: touch.clientY - rect.top,
                originalParent: this.parentElement,
                originalNextSibling: this.nextSibling,
                width: rect.width,
                height: rect.height
            };
            
            setTimeout(() => {
                if (!touchData) return;
                this.classList.add('dragging');
                this.style.width = touchData.width + 'px';
                this.style.height = touchData.height + 'px';
                this.style.position = 'fixed';
                document.body.appendChild(this);
                updatePosition(touch.clientX, touch.clientY);
            }, 50);
        }

        function handleTouchMove(e) {
            if (!touchData) return;
            e.preventDefault(); 
            const touch = e.touches[0];
            updatePosition(touch.clientX, touch.clientY);

            const elementBelow = document.elementFromPoint(touch.clientX, touch.clientY);
            const dropTarget = elementBelow?.closest('.tier-row');
            
            document.querySelectorAll('.tier-row').forEach(r => r.classList.remove('drop-target'));
            if (dropTarget) dropTarget.classList.add('drop-target');
        }

        function handleTouchEnd(e) {
            if (!touchData) return;
            const touch = e.changedTouches[0];
            const elementBelow = document.elementFromPoint(touch.clientX, touch.clientY);
            const dropTarget = elementBelow?.closest('.tier-row');

            this.classList.remove('dragging');
            this.style.position = '';
            this.style.left = '';
            this.style.top = '';
            this.style.width = '';
            this.style.height = '';
            this.style.zIndex = '';
            document.querySelectorAll('.tier-row').forEach(r => r.classList.remove('drop-target'));

            if (dropTarget) {
                dropTarget.appendChild(this);
            } else {
                if (touchData.originalNextSibling) {
                    touchData.originalParent.insertBefore(this, touchData.originalNextSibling);
                } else {
                    touchData.originalParent.appendChild(this);
                }
            }
            touchData = null;
        }

        function updatePosition(clientX, clientY) {
            if (!touchData) return;
            touchData.element.style.left = (clientX - touchData.offsetX) + 'px';
            touchData.element.style.top = (clientY - touchData.offsetY) + 'px';
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.style.opacity = '1';
            setTimeout(() => { toast.style.opacity = '0'; }, 2000);
        }

        window.onload = () => {
            const defaults = ['辣条音', '青受', '奶狗', '青年', '温青', '青攻', '青叔', '少年音', '温青叔', '叔音', '公子音'];
            const pool = document.getElementById('pool');
            [...new Set(defaults)].forEach(text => pool.appendChild(createItemElement(text)));
            
            document.getElementById('item-input').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') addItem();
            });
        };
    </script>
</body>
</html>
